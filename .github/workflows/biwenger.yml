name: Actualizar datos Biwenger

on:
  schedule:
    - cron: '0 */6 * * *'
  workflow_dispatch:

jobs:
  fetch:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio LaPausa
        uses: actions/checkout@v4

      - name: Instalar Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ejecutar script de Biwenger
        env:
          BIWENGER_EMAIL:    ${{ secrets.BIWENGER_EMAIL }}
          BIWENGER_PASSWORD: ${{ secrets.BIWENGER_PASSWORD }}
        run: node scripts/fetch-biwenger.js

      - name: Copiar fotos desde repo tomaquet
        run: |
          git clone --depth=1 https://github.com/JepLaGuitlla/tomaquet.git /tmp/tomaquet
          if [ -d "/tmp/tomaquet/img/players" ]; then
            mkdir -p img/players
            cp -n /tmp/tomaquet/img/players/*.avif img/players/ 2>/dev/null || true
            echo "✅ Fotos copiadas: $(ls img/players/*.avif 2>/dev/null | wc -l)"
          else
            echo "⚠️ No se encontró img/players en tomaquet"
          fi

      - name: Guardar cambios
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/data.json data/history.json data/prices.json
          git add img/players/ || true
          git diff --staged --quiet || git commit -m "datos: actualización automática $(date -u '+%Y-%m-%d %H:%M') UTC"
          git push
